name: EcoSync CD

on:
  push:
    branches: [ main ]

jobs:
  # ========== Job 1: 后端/前端基础检查 ==========
  ci-check:
    name: CI Check (Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend compile check
        run: mvn compile -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ecosync-frontend/package-lock.json

      - name: Frontend build check
        working-directory: ecosync-frontend
        run: |
          npm ci
          npm run build-only

  # ========== Job 2A: 构建并推送后端镜像 ==========
  docker-build-push-app:
    name: Build & Push App Image
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jojozhu9/ecosync-app
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=ecosync-app
          cache-to: type=gha,scope=ecosync-app,mode=max

  # ========== Job 2B: 构建并推送前端镜像 ==========
  docker-build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jojozhu9/ecosync-frontend
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ecosync-frontend
          file: ./ecosync-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=ecosync-frontend
          cache-to: type=gha,scope=ecosync-frontend,mode=max

  # ========== Job 3: 通过跳板机部署到内网虚拟机 ==========
  deploy-via-bastion:
    name: Deploy via Bastion
    runs-on: ubuntu-latest
    needs: [docker-build-push-app, docker-build-push-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy with SSH proxy (bastion)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          key: ${{ secrets.TARGET_SSH_KEY }}
          port: 22
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_SSH_KEY }}
          proxy_port: 22

          script: |
            cd /opt/EcoSync
            git fetch origin
            git reset --hard origin/main
            export APP_IMAGE=ghcr.io/jojozhu9/ecosync-app
            export FRONTEND_IMAGE=ghcr.io/jojozhu9/ecosync-frontend
            export IMAGE_TAG=${{ github.sha }}

            # Ensure seed images directory exists
            mkdir -p uploads/products

            # Pull only the two images we build in CI (not mysql/minio/nginx)
            docker compose pull app frontend || {
              echo "ERROR: Failed to pull images from GHCR"
              exit 1
            }

            # Bring up all services
            docker compose up -d --remove-orphans

            # Force-recreate frontend + gateway so old containers/images
            # can never survive a deploy (e.g. when pull failed silently or
            # Docker Compose didn't detect a config change). Gateway is
            # recreated as well because nginx caches upstream DNS and may
            # still point to the old frontend container IP otherwise.
            docker compose up -d --force-recreate frontend gateway

            # Verify the running frontend image matches this commit
            echo "=== Deploy verification ==="
            echo "Expected frontend: ${FRONTEND_IMAGE}:${IMAGE_TAG}"
            docker inspect --format='{{.Config.Image}}' ecosync-frontend
            echo "Expected app:       ${APP_IMAGE}:${IMAGE_TAG}"
            docker inspect --format='{{.Config.Image}}' ecosync-app

            # Wait for MinIO to be healthy
            echo "Waiting for MinIO..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
                echo "MinIO is ready"
                break
              fi
              echo "  attempt $i/20..."
              sleep 2
            done

            # Configure MinIO bucket (mc client is included in minio/minio image)
            export MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-ecosync123}
            docker compose exec -T minio mc alias set local http://localhost:9000 ecosync $MINIO_SECRET_KEY
            docker compose exec -T minio mc mb --ignore-existing local/ecosync
            docker compose exec -T minio mc anonymous set public local/ecosync

            # Sync seed images (overwrite changed, keep user uploads)
            docker compose exec -T minio mc mirror --overwrite /opt/seed-uploads/products/ local/ecosync/products/ || true

            echo "MinIO bucket configured and seeded"
