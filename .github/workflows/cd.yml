name: EcoSync CD

on:
  push:
    branches: [ main ]

jobs:
  # ========== Job 1: 后端/前端基础检查 ==========
  ci-check:
    name: CI Check (Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend package (skip tests)
        run: mvn package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ecosync-frontend/package-lock.json

      - name: Frontend build check
        working-directory: ecosync-frontend
        run: |
          npm ci
          npm run build-only

  # ========== Job 2: 构建并推送后端 + 前端镜像 ==========
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jojozhu9/ecosync-app
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jojozhu9/ecosync-frontend
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ecosync-frontend
          file: ./ecosync-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== Job 3: 通过跳板机部署到内网虚拟机 ==========
  deploy-via-bastion:
    name: Deploy via Bastion
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy with SSH proxy (bastion)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          key: ${{ secrets.TARGET_SSH_KEY }}
          port: 22
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_SSH_KEY }}
          proxy_port: 22

          script: |
            cd /opt/EcoSync
            git pull
            export APP_IMAGE=ghcr.io/jojozhu9/ecosync-app
            export FRONTEND_IMAGE=ghcr.io/jojozhu9/ecosync-frontend
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d --remove-orphans
