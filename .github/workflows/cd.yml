name: EcoSync CD

on:
  push:
    branches: [ main ]

jobs:
  # ========== Job 1: 运行 CI 检查 ==========
  ci-check:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn package -DskipTests -B

  # ========== Job 2: 构建 Docker 镜像并推送到 GitHub Container Registry ==========
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 部署说明 ==========
  # 由于服务器在校园网内，GitHub Actions 无法直接 SSH 连接。
  # CI 自动完成编译和镜像构建，部署需在服务器上手动执行。
  #
  # 首次部署（在服务器上执行）:
  #   cd /opt && sudo git clone https://github.com/JojoZhu9/EcoSync.git && cd EcoSync
  #   sudo docker compose up -d
  #
  # 后续更新（在服务器上执行）:
  #   cd /opt/EcoSync && sudo git pull && sudo docker compose up -d --build
