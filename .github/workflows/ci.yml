name: EcoSync CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========== Job 1: 编译 + 打包 ==========
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn compile -B

      - name: Package JAR (skip tests)
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecosync-jar
          path: target/*.jar
          retention-days: 7

  # ========== Job 2: 前端构建检查 ==========
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ecosync-frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ecosync-frontend
        run: npm ci

      - name: Build frontend
        working-directory: ecosync-frontend
        run: npm run build-only

      - name: Run Vitest (disabled)
        if: false
        working-directory: ecosync-frontend
        run: npx vitest run --reporter=verbose

  # ========== Job 3: 带 MySQL 的集成测试 (disabled) ==========
  test:
    if: false
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build, frontend-build]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_password
          MYSQL_DATABASE: 711ex
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -pci_test_password --silent && break
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      - name: Run tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ci_test_password
