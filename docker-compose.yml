services:
  mysql:
    image: mysql:8.0
    container_name: ecosync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ecosync123}
      MYSQL_DATABASE: 711ex
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: ${APP_IMAGE:-ghcr.io/jojozhu9/ecosync-app}:${IMAGE_TAG:-latest}
    container_name: ecosync-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ecosync123}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./ecosync-frontend
    image: ${FRONTEND_IMAGE:-ghcr.io/jojozhu9/ecosync-frontend}:${IMAGE_TAG:-latest}
    container_name: ecosync-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  gateway:
    image: nginx:alpine
    container_name: ecosync-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3307:3307"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./uploads:/opt/EcoSync/uploads:ro
    depends_on:
      - frontend
      - app
      - mysql

volumes:
  mysql-data:
