services:
  mysql:
    image: mysql:8.0
    container_name: ecosync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ecosync123}
      MYSQL_DATABASE: 711ex
      TZ: Asia/Shanghai                    # 新增：MySQL 容器时区
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro   # 新增：挂载宿主机时区
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: ${APP_IMAGE:-ghcr.io/jojozhu9/ecosync-app}:${IMAGE_TAG:-latest}
    container_name: ecosync-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ecosync123}
      TZ: Asia/Shanghai                     # 新增：应用容器时区
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro    # 新增：挂载宿主机时区

  frontend:
    build: ./ecosync-frontend
    image: ${FRONTEND_IMAGE:-ghcr.io/jojozhu9/ecosync-frontend}:${IMAGE_TAG:-latest}
    container_name: ecosync-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  minio:
    image: minio/minio
    container_name: ecosync-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
      - ./uploads:/opt/seed-uploads:ro
    environment:
      MINIO_ROOT_USER: ecosync
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ecosync123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  gateway:
    image: nginx:alpine
    container_name: ecosync-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3307:3307"
      - "9001:9001"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - app
      - mysql
      - minio

volumes:
  mysql-data:
  minio-data: