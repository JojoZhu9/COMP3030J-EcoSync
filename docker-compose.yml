services:
  mysql:
    image: mysql:8.0
    container_name: ecosync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ecosync123}
      MYSQL_DATABASE: 711ex
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/database/init_711_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ecosync-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ecosync123}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
