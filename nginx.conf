worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name csi420-02-vm9.ucd.ie;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name csi420-02-vm9.ucd.ie;

        ssl_certificate     /etc/letsencrypt/live/csi420-02-vm9.ucd.ie/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/csi420-02-vm9.ucd.ie/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Gateway -> MinIO (product images)
        location /uploads/ {
            proxy_pass http://minio:9000/ecosync/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Gateway -> frontend static site (HTTPS)
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Gateway -> backend APIs
        location /api/ {
            proxy_pass http://app:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Backend documentation endpoints
        location /doc.html {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        location /swagger-ui/ {
            proxy_pass http://app:8080/swagger-ui/;
            proxy_set_header Host $host;
        }

        location /webjars/ {
            proxy_pass http://app:8080/webjars/;
            proxy_set_header Host $host;
        }
    }

    # Gateway -> MinIO Console (port 9001)
    server {
        listen 9001 ssl http2;
        server_name csi420-02-vm9.ucd.ie;

        ssl_certificate     /etc/letsencrypt/live/csi420-02-vm9.ucd.ie/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/csi420-02-vm9.ucd.ie/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://minio:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}

stream {
    # Gateway -> MySQL
    server {
        listen 3307;
        proxy_pass mysql:3306;
    }
}
