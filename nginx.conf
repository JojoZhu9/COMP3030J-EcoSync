worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80 default_server;
        server_name csi420-02-vm9.ucd.ie localhost;

        # Certbot HTTP-01 challenge (webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Gateway -> frontend static site
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # Gateway -> backend APIs
        location /api/ {
            proxy_pass http://app:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # Gateway -> backend static uploads (product images)
        location /uploads/ {
            proxy_pass http://app:8080/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        # Backend documentation endpoints
        location /doc.html {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        location /swagger-ui/ {
            proxy_pass http://app:8080/swagger-ui/;
            proxy_set_header Host $host;
        }

        location /webjars/ {
            proxy_pass http://app:8080/webjars/;
            proxy_set_header Host $host;
        }
    }
}

stream {
    # Gateway -> MySQL
    server {
        listen 3307;
        proxy_pass mysql:3306;
    }
}
