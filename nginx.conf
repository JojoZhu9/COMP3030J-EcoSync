worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name csi420-02-vm9.ucd.ie;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        # 只监听 80 端口 (HTTP)
        listen 80 default_server;
        server_name csi420-02-vm9.ucd.ie localhost;

        # Gateway -> frontend static site
        location / {
            proxy_pass http://frontend:80;
              proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 将这里的 Proto 改为 http，因为我们不再使用 https
            proxy_set_header X-Forwarded-Proto http;
        }

        # Gateway -> backend APIs
        location /api/ {
            proxy_pass http://app:8080/api/;
              proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 同理，改为 http
            proxy_set_header X-Forwarded-Proto http;
        }

        # Backend documentation endpoints
        location /doc.html {
            proxy_pass http://app:8080;
              proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://app:8080;
              proxy_set_header Host $host;
        }

        location /swagger-ui/ {
            proxy_pass http://app:8080/swagger-ui/;
              proxy_set_header Host $host;
        }

        location /webjars/ {
            proxy_pass http://app:8080/webjars/;
              proxy_set_header Host $host;
        }
    }
}

stream {
    # Gateway -> MySQL
    server {
        listen 3307;
        proxy_pass mysql:3306;
    }
}
