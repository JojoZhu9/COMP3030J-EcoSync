server:
  port: 8080 # 部署端口

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: L.L.Lht20050828
  
  # 关键修复：禁用 Flyway，解决 MySQL 5.7 版本不兼容导致的启动崩溃
  flyway:
    enabled: false

mybatis:
  configuration:
    # 开启驼峰命名转换，让数据库字段 order_id 自动对应 Java 属性 orderId
    map-underscore-to-camel-case: true
  # 如果你的 Mapper XML 在 resources 下，建议加上这个（可选，视项目结构而定）
  # mapper-locations: classpath:mapper/*.xml

# SpringDoc (Knife4j 底层使用的规范) 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.bibilabo.controller

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-openapi: true
    enable-swagger-models: true