# SpringDoc (Knife4j 底层使用的规范) 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.bibilabo.controller # 确保这里是你的 Controller 包路径

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-openapi: true
    enable-swagger-models: true