server:
  port: 8080 # 部署端口

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/711ex?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ecosync123
  
  # Flyway 数据库版本管理：自动执行 src/main/resources/db/migration 下的迁移脚本
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 库里已有老表时，不会直接报错，而是先打 baseline 再增量迁移
    baseline-version: 0         # 从 0 开始，让 V1/V2 都能正常被应用到全新库
    validate-on-migrate: true

mybatis:
  configuration:
    # 开启驼峰命名转换，让数据库字段 order_id 自动对应 Java 属性 orderId
    map-underscore-to-camel-case: true
  # 如果你的 Mapper XML 在 resources 下，建议加上这个（可选，视项目结构而定）
  # mapper-locations: classpath:mapper/*.xml

# SpringDoc (Knife4j 底层使用的规范) 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.bibilabo.controller

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-openapi: true
    enable-swagger-models: true